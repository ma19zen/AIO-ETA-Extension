<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>MMM - ETA All-in-One</title>
  <link rel="stylesheet" href="popup.css" />
  <script src="popup.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-wrap">
        <img src="../logo/logo48.png" class="logo" alt="" />
      </div>
      <div class="title">
        <h1>ETA All-in-One</h1>
        <span class="badge">v1.0</span>
      </div>
    </header>

<section class="section">
  <h2>المنشئون</h2>
  <div class="credits">

    <a href="https://mazen.website" class="credit lead" target="_blank" rel="noopener noreferrer">
      <div class="credit-icon">M</div>
      <div class="credit-info">
        <span class="credit-role">Developer & Tweaks Combiner</span>
        <span class="credit-name">MMM</span>
      </div>
    </a>

    <a href="https://chromewebstore.google.com/detail/eohbomokfejacahjpcjhfifcbfjoehjl?utm_source=item-share-cb" class="credit" target="_blank" rel="noopener noreferrer">
      <div class="credit-icon">S</div>
      <div class="credit-info">
        <span class="credit-role">Developer</span>
        <span class="credit-name">Mohammed Sabry</span>
      </div>
    </a>

    <a href="https://chromewebstore.google.com/detail/phckbipoecfpdpkeidhloidggojadjnf?utm_source=item-share-cb" class="credit" target="_blank" rel="noopener noreferrer">
      <div class="credit-icon">F</div>
      <div class="credit-info">
        <span class="credit-role">Developer</span>
        <span class="credit-name">mohasibfriend.com</span>
      </div>
    </a>

  </div>
</section>
    <section class="section">
      <h2>الأدوات</h2>
      <div class="features">
        <div class="feature">
          <span class="feature-label">إدارة بيانات الدخول</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_credentials" checked /><span class="slider"></span></label>
        </div>
        <div class="feature">
          <span class="feature-label">تفعيل النسخ واللصق</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_copy_paste" checked /><span class="slider"></span></label>
        </div>
        <div class="feature">
          <span class="feature-label">إظهار كلمة المرور</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_password_eye" checked /><span class="slider"></span></label>
        </div>
        <div class="feature">
          <span class="feature-label">لصق الرقم القومي</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_nat_number" checked /><span class="slider"></span></label>
        </div>
        <div class="feature">
          <span class="feature-label">تعبئة بيانات التوقيع</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_signature" checked /><span class="slider"></span></label>
        </div>
        <div class="feature">
          <span class="feature-label">تحميل الإقرارات الضريبية</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_vat_download" checked /><span class="slider"></span></label>
        </div>
        <div class="feature">
          <span class="feature-label">تصدير الفواتير إلى إكسل</span>
          <label class="toggle"><input type="checkbox" data-toggle="toggle_invoice_export" checked /><span class="slider"></span></label>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
